services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - /home/wavel/projects/govpress-mcp/data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-latest
    command:
      - --model-id
      - BAAI/bge-m3
      - --max-batch-tokens
      - "32768"
      - --max-client-batch-size
      - "64"
    environment:
      HF_HUB_CACHE: /data
    gpus: all
    volumes:
      - /home/wavel/projects/govpress-mcp/data/tei-cache:/data
    ports:
      - "18080:80"

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "6379:6379"

  # mcp-server:
  #   build: .
  #   env_file: .env
  #   volumes:
  #     - /home/wavel/projects/govpress-mcp/data:/app/data:ro
  #   ports:
  #     - "8000:8000"
